<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
<style>
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.d1{animation:fadeIn .6s ease .1s both}
.d2{animation:fadeIn .6s ease .5s both}
.d3{animation:fadeIn .6s ease .9s both}
.d4{animation:fadeIn .6s ease 1.3s both}
.d5{animation:fadeIn .6s ease 1.7s both}
.d6{animation:fadeIn .6s ease 2.1s both}
.d7{animation:fadeIn .6s ease 2.5s both}
.d8{animation:fadeIn .6s ease 2.9s both}
.d9{animation:fadeIn .6s ease 3.3s both}
.d10{animation:fadeIn .6s ease 3.7s both}
.d11{animation:fadeIn .6s ease 4.1s both}
.d12{animation:fadeIn .6s ease 4.5s both}
.d13{animation:fadeIn .6s ease 5.0s both}
.d14{animation:fadeIn .6s ease 5.5s both}
.blink{animation:blink 1s step-end infinite}
.pulse{animation:pulse 2.2s ease-in-out infinite}
</style>
<defs>
  <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow3" x="-15%" y="-15%" width="130%" height="130%">
    <feGaussianBlur stdDeviation="1.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="hubGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity=".13"/>
    <stop offset="70%" stop-color="#001830" stop-opacity=".05"/>
    <stop offset="100%" stop-color="#010d1a" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#010c18"/>
    <stop offset="50%" stop-color="#010f1e"/>
    <stop offset="100%" stop-color="#00080f"/>
  </linearGradient>
  <linearGradient id="missionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#010c18"/>
    <stop offset="25%" stop-color="#001b30"/>
    <stop offset="75%" stop-color="#001b30"/>
    <stop offset="100%" stop-color="#010c18"/>
  </linearGradient>
  <linearGradient id="panelSep" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
    <stop offset="30%" stop-color="#00d4ff" stop-opacity=".25"/>
    <stop offset="70%" stop-color="#00d4ff" stop-opacity=".25"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </linearGradient>
  <pattern id="dots" patternUnits="userSpaceOnUse" width="22" height="22">
    <circle cx="11" cy="11" r=".85" fill="#081e32"/>
  </pattern>
  <!-- Hex grid overlay -->
  <pattern id="hexGrid" patternUnits="userSpaceOnUse" width="34.6" height="60">
    <polygon points="17.3,1 33.6,10 33.6,28 17.3,37 1,28 1,10"
             fill="none" stroke="#071828" stroke-width=".6"/>
    <polygon points="0,28 16.3,37 16.3,55 0,64 -16.3,55 -16.3,37"
             fill="none" stroke="#071828" stroke-width=".6"/>
    <polygon points="34.6,28 50.9,37 50.9,55 34.6,64 18.3,55 18.3,37"
             fill="none" stroke="#071828" stroke-width=".6"/>
  </pattern>
</defs>

<!-- ═══ BACKGROUND ═══ -->
<rect width="900" height="480" fill="url(#bgGrad)"/>
<rect width="900" height="480" fill="url(#hexGrid)" opacity=".7"/>
<rect width="900" height="480" fill="url(#dots)" opacity=".35"/>

<!-- Outer border -->
<rect width="900" height="480" fill="none" stroke="#00d4ff" stroke-width="1.4" opacity=".38"/>
<rect x="6" y="6" width="888" height="468" fill="none" stroke="#00d4ff" stroke-width=".4" opacity=".12"/>

<!-- Corner L-brackets -->
<g stroke="#00d4ff" stroke-width="2" fill="none" opacity=".65">
  <path d="M0,28 L0,0 L28,0"/>
  <path d="M872,0 L900,0 L900,28"/>
  <path d="M0,452 L0,480 L28,480"/>
  <path d="M872,480 L900,480 L900,452"/>
</g>
<g stroke="#00d4ff" stroke-width=".8" fill="none" opacity=".25">
  <path d="M0,38 L0,28"/>
  <path d="M38,0 L28,0"/>
  <path d="M900,452 L900,462"/>
  <path d="M862,480 L872,480"/>
</g>

<!-- Vertical scan line animation -->
<rect width="900" height="2" y="0" fill="#00d4ff" opacity=".04">
  <animate attributeName="y" from="0" to="480" dur="8s" repeatCount="indefinite"/>
</rect>

